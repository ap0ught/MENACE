name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      # Replaces the default cache id in sw.js so each deploy invalidates the old precache.
      - name: Stamp service worker cache version
        run: |
          VER="menace-pwa-${GITHUB_RUN_NUMBER}-$(echo "$GITHUB_SHA" | cut -c1-7)"
          sed -i "s/\"menace-pwa-v1\"/\"${VER}\"/" sw.js
          grep -q "$VER" sw.js

      - name: Prepare site bundle
        run: |
          mkdir -p site
          cp index.html styles.css manifest.webmanifest sw.js site/
          cp -r js icons site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
