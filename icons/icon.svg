<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="MENACE matchbox">
  <defs>
    <linearGradient id="boxFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d9bc94"/>
      <stop offset="100%" stop-color="#b8956e"/>
    </linearGradient>
    <linearGradient id="innerPaper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#f0e6d8"/>
    </linearGradient>
    <clipPath id="sleeveClip">
      <rect x="88" y="72" width="336" height="368" rx="28"/>
    </clipPath>
  </defs>
  <rect width="512" height="512" rx="96" fill="#2d3748"/>
  <ellipse cx="256" cy="448" rx="140" ry="18" fill="#1a202c" opacity="0.35"/>
  <rect x="88" y="72" width="336" height="368" rx="28" fill="url(#boxFace)" stroke="#5c4030" stroke-width="6"/>
  <rect x="88" y="72" width="336" height="26" rx="26" fill="#e8d4b8" opacity="0.55"/>
  <!-- Strike strip clipped to sleeve -->
  <rect x="88" y="72" width="64" height="368" fill="#7f1d1d" clip-path="url(#sleeveClip)"/>
  <rect x="96" y="96" width="8" height="320" rx="2" fill="#451a1a" opacity="0.45" clip-path="url(#sleeveClip)"/>
  <rect x="168" y="96" width="240" height="320" rx="18" fill="url(#innerPaper)" stroke="#c4b49a" stroke-width="4"/>
  <g fill="none" stroke="#2d3748" stroke-width="6" stroke-linecap="square" opacity="0.9">
    <line x1="258" y1="166" x2="258" y2="346"/>
    <line x1="318" y1="166" x2="318" y2="346"/>
    <line x1="198" y1="226" x2="378" y2="226"/>
    <line x1="198" y1="286" x2="378" y2="286"/>
  </g>
</svg>
